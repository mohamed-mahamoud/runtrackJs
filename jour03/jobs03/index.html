<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle arc-en-ciel</title>
</head>
<body>
<button id="shuffle">Mélanger les pièces</button>
<p id="resultat"></p>
<div id="taquin" style="display:grid;grid-template-columns:repeat(3, 120px);gap:6px;width:max-content;">
    <div class="piece" id="piece1"><img src="./asset/logo1.png" alt="Pièce 1" height="120px"></div>
    <div class="piece" id="piece2"><img src="./asset/logo2.png" alt="Pièce 2" height="120px"></div>
    <div class="piece" id="piece3"><img src="./asset/logo3.png" alt="Pièce 3" height="120px"></div>
    <div class="piece" id="piece4"><img src="./asset/logo4.png" alt="Pièce 4" height="120px"></div>
    <div class="piece" id="piece5"><img src="./asset/logo5.png" alt="Pièce 5" height="120px"></div>
    <div class="piece" id="piece6"><img src="./asset/logo6.png" alt="Pièce 6" height="120px"></div>
    <div class="piece" id="piece7"><img src="./asset/logo7.png" alt="Pièce 7" height="120px"></div>
    <div class="piece" id="piece8"><img src="./asset/logo8.png" alt="Pièce 8" height="120px"></div>
    <div class="piece" id="empty" style="width:120px;height:120px;border:1px dashed #888;"></div>
</div>
</body>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
    <script src="script.js" defer></script>
</html>
