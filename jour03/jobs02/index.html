<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle arc-en-ciel</title>
</head>
<body>
<button id="shuffle">Mélanger les pièces</button>
<fieldset id="dropZone" style="width: 400px; height: 200px; border: 2px dashed #ccc; margin-top: 20px;">
    <legend>Dépose les pièces ici</legend>
</fieldset>
<p id="resultat"></p>
<span id="puzzle">
    <span class="piece" id="piece1"><img src="./asset/arc1.png" alt="Pièce 1" height="120px"></span>
    <span class="piece" id="piece2"><img src="./asset/arc2.png" alt="Pièce 2" height="120px"></span>
    <span class="piece" id="piece3"><img src="./asset/arc3.png" alt="Pièce 3" height="120px"></span>
    <span class="piece" id="piece4"><img src="./asset/arc4.png" alt="Pièce 4" height="120px"></span>
    <span class="piece" id="piece5"><img src="./asset/arc5.png" alt="Pièce 5" height="120px"></span>
    <span class="piece" id="piece6"><img src="./asset/arc6.png" alt="Pièce 6" height="120px"></span>
</span>
</body>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
    <script src="script.js" defer></script>
</html>
