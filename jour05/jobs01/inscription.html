<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <form id="form-inscription" action="inscription.html" method="post" novalidate>
        <label for="name">Nom:</label>
        <input type="text" id="name" name="name" required>
        <div id="error-nom" class="error-message" style="color:red"></div><br>
        <label for="firstname" >Prénom:</label>
        <input type="text" id="firstname" name="firstname" required>
        <div id="error-prenom" class="error-message" style="color:red"></div><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <div id="error-email" class="error-message" style="color:red"></div><br>
        <label for="address">Adresse:</label>
        <input type="text" id="address" name="address" required>
        <div id="error-address" class="error-message" style="color:red"></div><br>
        <label for="postal">Code postal:</label>
        <input type="text" id="postal" name="postal" required>
        <div id="error-postal" class="error-message" style="color:red"></div><br>
        <label for="password">Mot de passe:</label>
        <input type="password" id="password" name="password" required>
        <div id="error-password" class="error-message" style="color:red"></div><br>
        <input type="submit" value="S'inscrire">
    </form>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
